<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagster GraphQL — RAG Chatbot</title>
    <meta name="description" content="Ask questions about Dagster's GraphQL API, Python client, and MCP server.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #22263a;
            --border: #2a2e3f;
            --text: #e4e6ef;
            --text-muted: #8b8fa3;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.25);
            --user-bubble: #6c5ce7;
            --bot-bubble: #1e2235;
            --success: #00cec9;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── Header ─── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #13151f 0%, var(--bg) 100%);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logo h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .logo h1 span { color: var(--text-muted); font-weight: 400; }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
        }

        .status-dot {
            width: 7px; height: 7px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ─── Chat Area ─── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14px;
            animation: slideUp 0.3s ease;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), #7c6ef0);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.bot code {
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 13px;
            font-family: 'Fira Code', 'Consolas', monospace;
        }

        .message.bot pre {
            background: #12141e;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin: 10px 0 4px;
            overflow-x: auto;
            font-size: 12.5px;
            line-height: 1.5;
        }

        .message.bot pre code {
            background: none;
            padding: 0;
        }

        /* Typing indicator */
        .typing {
            align-self: flex-start;
            display: flex;
            gap: 5px;
            padding: 16px 22px;
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-bottom-left-radius: 4px;
            animation: slideUp 0.3s ease;
        }

        .typing span {
            width: 7px; height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Welcome */
        .welcome {
            text-align: center;
            margin: auto;
            padding: 40px 20px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .suggestions button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .suggestions button:hover {
            background: var(--surface-hover);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* ─── Input Area ─── */
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        #question {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            transition: border-color 0.2s;
        }

        #question::placeholder { color: var(--text-muted); }
        #question:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        #send {
            background: linear-gradient(135deg, var(--accent), #7c6ef0);
            border: none;
            border-radius: 12px;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
        }

        #send:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-glow); }
        #send:active { transform: scale(0.95); }
        #send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        #send svg {
            width: 20px; height: 20px;
            fill: none; stroke: #fff;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            header { padding: 12px 16px; }
            .logo h1 { font-size: 15px; }
            #chat { padding: 16px; gap: 12px; }
            .message { max-width: 88%; font-size: 13.5px; padding: 12px 14px; }
            .input-area { padding: 12px 16px 16px; }
            #question { padding: 12px 14px; font-size: 14px; }
            .welcome h2 { font-size: 18px; }
            .suggestions { flex-direction: column; }
            .suggestions button { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">D</div>
        <h1>Dagster RAG <span>· GraphQL Docs</span></h1>
    </div>
    <div class="status">
        <div class="status-dot"></div>
        <span>Online</span>
    </div>
</header>

<div id="chat">
    <div class="welcome" id="welcome">
        <h2>👋 Ask anything about Dagster GraphQL</h2>
        <p>I can help with the GraphQL API, Python client, queries, mutations, and the MCP server.</p>
        <div class="suggestions">
            <button onclick="ask(this.textContent)">How do I list Dagster runs?</button>
            <button onclick="ask(this.textContent)">What is DagsterGraphQLClient?</button>
            <button onclick="ask(this.textContent)">How to launch a run via GraphQL?</button>
            <button onclick="ask(this.textContent)">How do I install the MCP server?</button>
        </div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrap">
        <textarea id="question" rows="1" placeholder="Ask about Dagster GraphQL..."
                  onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send" onclick="sendMessage()" aria-label="Send">
            <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
        </button>
    </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('question');
const sendBtn = document.getElementById('send');
const welcome = document.getElementById('welcome');

function ask(text) {
    input.value = text;
    sendMessage();
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function addMessage(text, role) {
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    if (role === 'bot') {
        // Basic markdown rendering
        let html = text
            .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
        div.innerHTML = html;
    } else {
        div.textContent = text;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing';
    el.id = 'typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

async function sendMessage() {
    const q = input.value.trim();
    if (!q) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(q, 'user');
    showTyping();

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q }),
        });

        hideTyping();

        if (!res.ok) throw new Error(`Server error (${res.status})`);

        const data = await res.json();
        addMessage(data.answer, 'bot');
    } catch (err) {
        hideTyping();
        addMessage(`⚠️ ${err.message}. Is the server running?`, 'bot');
    } finally {
        sendBtn.disabled = false;
        input.focus();
    }
}

input.focus();
</script>
</body>
</html>
